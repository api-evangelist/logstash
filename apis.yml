apis:
  - aid: logstash:logstash-monitoring-api
    name: Logstash Monitoring API
    description: >-
      The Logstash Monitoring API exposes node info, plugin info, node stats,
      hot threads, and a health report endpoint over HTTP on port 9600 by
      default. There is no published OpenAPI specification; see Elastic's
      monitoring documentation for endpoint details.
    humanURL: https://www.elastic.co/guide/en/logstash/current/monitoring-logstash.html
