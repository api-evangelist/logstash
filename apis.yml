aid: logstash
name: Logstash
description: >-
  Open source server-side data processing pipeline that ingests data from
  multiple sources, transforms it, and sends it to a specified destination.
  Part of the Elastic Stack.
type: Index
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
  - Data Processing
